name: Deploy

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "test" ]; then
            echo "value=test" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/renmengwen/new-api:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_prod:
    if: github.ref_name == 'main'
    needs: build_image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy production to old server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /root/new-api
            docker compose pull new-api
            docker compose up -d
            docker image prune -f
            echo "Production deployed"

  deploy_test:
    if: github.ref_name == 'test'
    needs: build_image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy test to new server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_DEPLOY_HOST }}
          username: root
          key: ${{ secrets.TEST_DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /root/new-api-test-deploy
            docker compose pull
            docker compose up -d
            docker image prune -f
            echo "Test deployed"
