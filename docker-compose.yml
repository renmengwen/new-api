# New-API Docker Compose Configuration
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line 15
#   2. Uncomment the mysql service and SQL_DSN line 16
#   3. Uncomment mysql in depends_on (line 28)
#   4. Uncomment mysql_data in volumes section (line 64)
#
# вҡ пёҸ  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    build: .
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api # вҡ пёҸ IMPORTANT: Change the password in production!
#      - SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # жҳҜеҗҰеҗҜз”Ёй”ҷиҜҜж—Ҙеҝ—и®°еҪ• (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # жҳҜеҗҰеҗҜз”Ёжү№йҮҸжӣҙж–° (Whether to enable batch update)
#      - STREAMING_TIMEOUT=300  # жөҒжЁЎејҸж— е“Қеә”и¶…ж—¶ж—¶й—ҙпјҢеҚ•дҪҚз§’пјҢй»ҳи®?20з§’пјҢеҰӮжһңеҮәзҺ°з©әиЎҘе…ЁеҸҜд»Ҙе°қиҜ•ж”№дёәжӣҙеӨ§еҖ?пјҲStreaming timeout in seconds, default is 120s. Increase if experiencing empty completionsпј?#      - SESSION_SECRET=random_string  # еӨҡжңәйғЁзҪІж—¶и®ҫзҪ®пјҢеҝ…йЎ»дҝ®ж”№иҝҷдёӘйҡҸжңәеӯ—з¬ҰдёІпјҒпј?пјҲmulti-node deployment, set this to a random string!!!!!!!пј?#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics зҡ„жөӢйҮ?ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami зҪ‘з«ҷ ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami и„ҡжң¬ URLпјҢй»ҳи®Өдёәе®ҳж–№ең°еқҖ (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - postgres
#      - mysql  # Uncomment if using MySQL
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456  # вҡ пёҸ IMPORTANT: Change this password in production!
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456  # вҡ пёҸ IMPORTANT: Change this password in production!
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - new-api-network
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
  pg_data:
#  mysql_data:

networks:
  new-api-network:
    driver: bridge
