root = "."
tmp_dir = "tmp"

[build]
 bin = "./tmp/main.exe"
 cmd = "go build -o ./tmp/main.exe ."
 delay = 1000
 exclude_dir = ["assets", "tmp", "vendor", "node_modules", "web", "dist"]
 include_ext = ["go", "tpl", "tmpl", "html", "yml", "yaml", "json", "toml", "env"]
 kill_delay = "2s"
 log = "build-errors.log"
 stop_on_error = true

[log]
 time = false

[misc]
 clean_on_exit = true
